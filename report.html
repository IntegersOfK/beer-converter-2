<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#17110a">
<title>Beer Converter · Final Report</title>
<script>
  (function() {
    var t = localStorage.getItem('beerConverter.theme');
    if (t === 'beach') document.documentElement.setAttribute('data-theme', 'beach');
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,400,50;0,9..144,700,80;0,9..144,900,100;1,9..144,500,50&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root, [data-theme="bar"] {
    --bg: #17110a; --bg-elev: #1f1710; --bg-card: #2a1f15; --bg-input: #0f0a06;
    --ink: #f4e9d0; --ink-dim: #c9b894; --ink-soft: #8b7b5f;
    --amber: #e0a34a; --amber-bright: #f5be5e; --amber-deep: #b87a2e;
    --line: #3a2d1e; --line-soft: #241a11;
  }
  [data-theme="beach"] {
    --bg: #f3e6c7; --bg-elev: #fbf3da; --bg-card: #ede0bb; --bg-input: #ffffff;
    --ink: #1a140a; --ink-dim: #5a4630; --ink-soft: #7a6030;
    --amber: #b8741a; --amber-bright: #d18a30; --amber-deep: #8b520c;
    --line: #c8b683; --line-soft: #dfd0a2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); color: var(--ink); }
  body {
    font-family: ui-sans-serif, system-ui, sans-serif;
    min-height: 100vh;
    padding: 24px clamp(16px, 5vw, 36px) 72px;
    max-width: 640px; margin: 0 auto;
  }
  a { color: inherit; }

  .brand {
    display: flex; align-items: baseline; gap: 8px; margin-bottom: 28px;
  }
  .brand-name {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px; color: var(--amber); font-weight: 400;
  }
  .brand-dot { color: var(--line); }
  .brand-date { font-size: 12px; color: var(--ink-soft); margin-left: auto; }

  .report-title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: clamp(36px, 9vw, 58px);
    font-weight: 900; line-height: 1; letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .report-title em { color: var(--amber); font-style: italic; }
  .report-sub { font-size: 13px; color: var(--ink-soft); margin-bottom: 32px; }

  /* Rankings */
  .rankings { margin-bottom: 20px; }
  .rank-row {
    display: grid; grid-template-columns: 90px 1fr 64px;
    gap: 10px; align-items: center; margin-bottom: 10px;
  }
  .rank-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rank-bar-track { height: 7px; background: var(--line); border-radius: 99px; overflow: hidden; }
  .rank-bar { height: 100%; border-radius: 99px; }
  .rank-bar.top  { background: var(--amber-bright); }
  .rank-bar.mid  { background: var(--amber); }
  .rank-bar.rest { background: var(--amber-deep); }
  .rank-val { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--ink-dim); text-align: right; }

  /* Group quip */
  .quip-block {
    background: var(--bg-elev); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 28px;
    font-size: 14px; color: var(--ink-dim); line-height: 1.6;
  }
  .quip-block b { color: var(--ink); }

  hr.div { border: none; border-top: 1px dashed var(--line); margin: 24px 0; }

  /* Person cards */
  .person-card {
    background: var(--bg-elev); border: 1px solid var(--line); border-radius: 12px;
    margin-bottom: 14px; overflow: hidden;
  }
  .card-head { padding: 14px 16px 10px; border-bottom: 1px solid var(--line-soft); }
  .card-name {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px; font-weight: 700; margin-bottom: 3px;
  }
  .card-meta { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-soft); margin-bottom: 4px; }
  .card-quip { font-size: 12px; color: var(--amber); font-style: italic; }

  .drink-list { padding: 4px 0; }
  .drink-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 7px 16px; gap: 8px;
  }
  .drink-row + .drink-row { border-top: 1px solid var(--line-soft); }
  .drink-row .dn { font-size: 13px; color: var(--ink-dim); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .drink-row .dm { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-soft); white-space: nowrap; flex-shrink: 0; }
  .drink-row .ds { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--amber); white-space: nowrap; flex-shrink: 0; min-width: 44px; text-align: right; }

  .card-foot {
    padding: 9px 16px; border-top: 1px dashed var(--line);
    display: flex; justify-content: space-between;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--ink-dim);
  }
  .card-foot .total { color: var(--amber); font-weight: 600; }

  /* Group totals */
  .totals-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px;
  }
  .total-tile {
    background: var(--bg-card); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px;
  }
  .total-tile .tl { font-size: 10px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
  .total-tile .tv { font-family: 'IBM Plex Mono', monospace; font-size: 22px; color: var(--amber); font-weight: 600; }
  .total-tile .ts { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }

  /* Actions */
  .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
  .btn {
    font-family: inherit; font-size: 14px; padding: 10px 18px; border-radius: 8px;
    cursor: pointer; border: 1px solid var(--line); background: var(--bg-card); color: var(--ink);
    transition: border-color 0.15s, color 0.15s; text-decoration: none; display: inline-block;
  }
  .btn:hover { border-color: var(--amber-deep); color: var(--amber); }
  .btn.primary { background: var(--amber); color: #1a140d; border-color: var(--amber-bright); font-weight: 600; }
  .btn.primary:hover { background: var(--amber-bright); }
  .btn.ghost { background: transparent; color: var(--ink-soft); }

  .footnote { font-size: 11px; color: var(--ink-soft); line-height: 1.6; }
  .footnote a { text-decoration: underline; text-underline-offset: 2px; opacity: 0.7; }

  /* Donut chart */
  .donut-wrap {
    background: var(--bg-elev); border: 1px solid var(--line); border-radius: 12px;
    padding: 16px; margin-bottom: 16px;
  }
  .donut-title { font-size: 10px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 14px; }
  .donut-body  { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .donut-svg   { width: 120px; height: 120px; flex-shrink: 0; }
  .donut-legend { flex: 1; min-width: 100px; display: flex; flex-direction: column; gap: 9px; }
  .legend-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--ink-dim); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .legend-val  { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-soft); white-space: nowrap; }

  /* Comparison */
  .cmp-section {
    background: var(--bg-elev); border: 1px solid var(--line); border-radius: 12px;
    margin-bottom: 16px; overflow: hidden;
  }
  summary.cmp-summary {
    padding: 13px 16px; cursor: pointer; user-select: none;
    font-size: 13px; font-weight: 600; color: var(--ink-dim);
    display: flex; justify-content: space-between; align-items: center;
    list-style: none;
  }
  summary.cmp-summary::-webkit-details-marker { display: none; }
  summary.cmp-summary::after { content: '▾'; font-weight: 400; color: var(--ink-soft); }
  details[open] summary.cmp-summary::after { content: '▴'; }
  .cmp-body { padding: 0 16px 14px; border-top: 1px solid var(--line-soft); }
  .cmp-row {
    display: grid; grid-template-columns: 1fr auto auto;
    gap: 8px 12px; align-items: baseline;
    padding: 8px 0; font-size: 13px;
  }
  .cmp-row + .cmp-row { border-top: 1px solid var(--line-soft); }
  .cmp-name { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cmp-std  { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-dim); white-space: nowrap; }
  .cmp-tag  { font-size: 11px; white-space: nowrap; text-align: right; }
  .cmp-tag.lead   { color: var(--amber-bright); }
  .cmp-tag.behind { color: var(--ink-soft); }
  .cmp-tag.dry    { color: var(--ink-soft); font-style: italic; }
  .matrix-wrap { margin-top: 16px; overflow-x: auto; }
  .matrix-label { font-size: 10px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .matrix-table { border-collapse: collapse; width: 100%; }
  .matrix-table th {
    padding: 5px 8px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600;
    color: var(--ink-soft); text-align: center; white-space: nowrap;
  }
  .matrix-table th:first-child { text-align: right; padding-right: 12px; }
  .matrix-table td {
    padding: 5px 8px; text-align: center;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    border-top: 1px solid var(--line-soft); color: var(--ink-dim);
  }
  .matrix-table tr td:first-child { text-align: right; font-weight: 600; color: var(--ink-soft); padding-right: 12px; }
  .matrix-table td.self   { color: var(--line); }
  .matrix-table td.hi     { color: var(--amber); }
  .matrix-table td.lo     { color: var(--ink-soft); }
  .matrix-table td.nil    { color: var(--line); }

  /* Comments */
  .comments-log { margin-bottom: 28px; }
  .log-title { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 12px; }
  .log-item {
    background: var(--bg-elev); border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 12px; margin-bottom: 8px;
  }
  .log-meta { display: flex; justify-content: space-between; margin-bottom: 3px; }
  .log-author { font-size: 12px; font-weight: 700; color: var(--amber); }
  .log-time { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--ink-soft); }
  .log-text { font-size: 13px; color: var(--ink-dim); line-height: 1.5; white-space: pre-wrap; word-break: break-word; }

  /* Error / empty */
  .error { text-align: center; padding: 80px 20px; }
  .error h2 { font-family: 'Fraunces', serif; font-size: 32px; margin-bottom: 10px; }
  .error p  { color: var(--ink-soft); margin-bottom: 24px; }

  /* Theme toggle button */
  #btnTheme {
    position: fixed;
    top: max(env(safe-area-inset-top), 14px);
    right: clamp(16px, 5vw, 36px);
    z-index: 50;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    color: var(--ink-soft);
    width: 38px; height: 38px;
    border-radius: 10px;
    display: grid; place-items: center;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    padding: 0;
  }
  #btnTheme:hover { border-color: var(--amber-deep); color: var(--amber); }
  #btnTheme svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  #btnTheme .icon-beach { display: block; }
  #btnTheme .icon-bar   { display: none; }
  [data-theme="beach"] #btnTheme .icon-beach { display: none; }
  [data-theme="beach"] #btnTheme .icon-bar   { display: block; }
</style>
</head>
<body>
<button id="btnTheme" title="Switch theme" aria-label="Switch theme">
  <svg class="icon-beach" viewBox="0 0 24 24">
    <path d="M3 11 Q12 3 21 11"/>
    <line x1="12" y1="3" x2="12" y2="11"/>
    <line x1="12" y1="11" x2="9" y2="22"/>
    <path d="M6 20 Q9 18 12 20"/>
  </svg>
  <svg class="icon-bar" viewBox="0 0 24 24">
    <path d="M4 4h16L12 16Z"/>
    <line x1="12" y1="16" x2="12" y2="21"/>
    <line x1="7" y1="21" x2="17" y2="21"/>
    <circle cx="15" cy="11" r="1.5"/>
    <line x1="12" y1="13" x2="15" y2="9"/>
  </svg>
</button>
<div id="root">
  <div class="error">
    <h2>No report here</h2>
    <p>Open this from the app's Final Report button.</p>
    <a href="/" class="btn">← Back to app</a>
  </div>
</div>
<script>
const STD_DRINK_ML = 17.05;
const COLORS = ['#f5be5e','#c56434','#6db672','#6aa8c8','#a87bc8','#c87ba0'];

function ethanolOf(d) { return d.v * d.a / 100; }
function stdOf(e)      { return e / STD_DRINK_ML; }
function fmt(n, dp)    { return isFinite(n) ? n.toFixed(dp) : '—'; }
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Two paths into the report:
//   ?s=<sid>   — fetches the live shared session from the server, polls
//                every 5 s. This is what the current app generates.
//   ?d=<blob>  — legacy base64 payload, kept so older share links still work.
const IS_SEPARATE_FRONTEND = ['localhost', '127.0.0.1'].includes(location.hostname) && location.port !== '8787';
const API_BASE = IS_SEPARATE_FRONTEND ? 'http://localhost:8787' : '';

function decodeLegacy() {
  try {
    const d = new URLSearchParams(location.search).get('d');
    if (!d) return null;
    return JSON.parse(decodeURIComponent(escape(atob(d))));
  } catch { return null; }
}

// Convert the server's session shape into the legacy payload shape so the
// rest of the renderer didn't have to change.
function fromServer(s) {
  if (!s) return null;
  let bm = null;
  if (s.benchmarkPresetKey && Array.isArray(s.presets)) {
    const m = s.presets.find(p => p.presetKey === s.benchmarkPresetKey);
    if (m) bm = { n: m.name, v: m.volumeMl, a: m.abv };
  }
  const drinksByPerson = new Map();
  const personMap = new Map();
  for (const p of (s.people || [])) {
    personMap.set(p.id, p.name);
  }
  for (const d of (s.drinks || [])) {
    if (!drinksByPerson.has(d.personId)) drinksByPerson.set(d.personId, []);
    drinksByPerson.get(d.personId).push({
      n: d.name,
      v: +d.volumeMl.toFixed(1),
      a: +d.abv.toFixed(2),
      ...(d.flavour ? { f: d.flavour } : {}),
    });
  }
  return {
    v: 1,
    ts: s.updatedAt ? Date.parse(s.updatedAt) : Date.now(),
    p: (s.people || []).map(p => ({ n: p.name, d: drinksByPerson.get(p.id) || [] })),
    bm,
    _sid: s.id,
    _updatedAt: s.updatedAt,
    c: (s.comments || []).map(c => ({
      i: c.id,
      author: personMap.get(c.personId) || 'Anonymous',
      t: c.text,
      ts: c.t,
    })),
  };
}

async function fetchSession(sid) {
  const r = await fetch(API_BASE + '/api/sessions/' + encodeURIComponent(sid));
  if (!r.ok) throw new Error('fetch failed: ' + r.status);
  return fromServer(await r.json());
}

async function loadInitial() {
  const params = new URLSearchParams(location.search);
  const sid = params.get('s');
  if (sid) {
    try { return await fetchSession(sid); }
    catch (e) { console.error('session fetch failed', e); return null; }
  }
  return decodeLegacy();
}

function personalQuip(std) {
  if (std === 0)  return 'Perfectly sober. Suspicious, frankly.';
  if (std < 0.5)  return 'More symbolic than substantive.';
  if (std < 1)    return 'Respectably restrained.';
  if (std < 2)    return 'A light hand — keeping it civilized.';
  if (std < 3)    return 'A proper social evening.';
  if (std < 4)    return 'Committed to the bit.';
  if (std < 5)    return 'Full send, no apologies.';
  if (std < 7)    return 'The morning will have thoughts.';
  if (std < 9)    return 'Bold. Ambitious. Brave.';
  if (std < 12)   return 'Future historians may debate this.';
  return 'This report cannot be used in court.';
}

function groupQuip(people) {
  const drinkers = people.filter(p => p.std > 0).sort((a, b) => b.std - a.std);
  if (!drinkers.length) return 'A completely sober evening. A legend in its own right.';
  const total = people.reduce((s, p) => s + p.std, 0);
  const avg   = total / people.length;
  const dry   = people.filter(p => p.std === 0);
  if (drinkers.length === 1) {
    return dry.length
      ? `<b>${esc(drinkers[0].n)}</b> carried the night solo while ${dry.map(p => `<b>${esc(p.n)}</b>`).join(' and ')} watched with quiet judgement.`
      : `<b>${esc(drinkers[0].n)}</b> was the only one drinking tonight.`;
  }
  const leader = drinkers[0], second = drinkers[1];
  const ratio  = leader.std / Math.max(second.std, 0.01);
  if (Math.abs(ratio - 1) < 0.08) return `<b>${esc(leader.n)}</b> and <b>${esc(second.n)}</b> finished in a dead heat — remarkably even pour distribution for a group this chaotic.`;
  if (ratio >= 2) return `<b>${esc(leader.n)}</b> had <b>${fmt(ratio, 1)}×</b> the ethanol of <b>${esc(second.n)}</b>. The gap speaks for itself.`;
  if (avg < 1.5) return 'A tasteful and restrained evening all around. The liver approves.';
  if (avg < 3)   return `A solid group effort — ${fmt(total, 1)} standard drinks across ${people.length} people. Respectable.`;
  if (avg < 5)   return `${fmt(total, 1)} standard drinks for ${people.length} people. Health Canada's low-risk guidelines are aware of this report.`;
  return `${fmt(total, 1)} standard drinks across ${people.length} people. The details of this evening are between you and your liver.`;
}

// Donut chart: SVG stroke-dasharray slices, shown only when 2+ drinkers.
function buildDonut(people) {
  const drinkers = people.filter(p => p.ethanol > 0);
  if (drinkers.length < 2) return '';
  const total = drinkers.reduce((s, p) => s + p.ethanol, 0);
  const R = 42, cx = 60, cy = 60, C = 2 * Math.PI * R;
  let angle = -90;
  const slices = drinkers.map((p, i) => {
    const dash  = (p.ethanol / total * C).toFixed(2);
    const gap   = (C + 1).toFixed(2);
    const color = COLORS[i % COLORS.length];
    const s = `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${color}" stroke-width="15"
      stroke-dasharray="${dash} ${gap}" transform="rotate(${angle.toFixed(1)} ${cx} ${cy})"/>`;
    angle += p.ethanol / total * 360;
    return s;
  });
  const legend = drinkers.map((p, i) => `
    <div class="legend-row">
      <span class="legend-dot" style="background:${COLORS[i % COLORS.length]}"></span>
      <span class="legend-name">${esc(p.n)}</span>
      <span class="legend-val">${(p.ethanol / total * 100).toFixed(0)}% · ${fmt(p.ethanol, 1)} ml</span>
    </div>`).join('');
  return `
    <div class="donut-wrap">
      <div class="donut-title">Ethanol share</div>
      <div class="donut-body">
        <svg viewBox="0 0 120 120" class="donut-svg">
          ${slices.join('')}
          <text x="${cx}" y="${cy - 4}" text-anchor="middle"
            style="font-family:'IBM Plex Mono',monospace;font-size:13px;fill:#e0a34a;font-weight:600;"
          >${fmt(total, 0)}</text>
          <text x="${cx}" y="${cy + 9}" text-anchor="middle"
            style="font-family:ui-sans-serif,sans-serif;font-size:7px;fill:#8b7b5f;letter-spacing:.06em;"
          >ML ETHANOL</text>
        </svg>
        <div class="donut-legend">${legend}</div>
      </div>
    </div>`;
}

// Collapsible per-person breakdown + pairwise matrix (3+ people).
function buildComparison(people, bm) {
  if (people.length < 2) return '';
  const sorted = [...people].sort((a, b) => b.std - a.std);
  const leader = sorted.find(p => p.std > 0);
  const rows = sorted.map(p => {
    let cls, tag;
    if (p.std === 0) {
      cls = 'dry'; tag = 'stayed dry';
    } else if (!leader || Math.abs(p.std / leader.std - 1) < 0.03) {
      cls = 'lead'; tag = sorted.filter(x => x.std > 0).length === 1 ? 'only drinker' : 'leading';
    } else {
      cls = 'behind'; tag = `${fmt(leader.std / p.std, 2)}× behind ${esc(leader.n)}`;
    }
    const bmPart = bm && p.bmEquiv != null && p.std > 0
      ? ` · ${fmt(p.bmEquiv, 1)} ${esc(bm.n.toLowerCase())}${Math.round(p.bmEquiv) === 1 ? '' : 's'}`
      : '';
    return `
      <div class="cmp-row">
        <div class="cmp-name">${esc(p.n)}</div>
        <div class="cmp-std">${fmt(p.std, 2)} std${bmPart}</div>
        <div class="cmp-tag ${cls}">${tag}</div>
      </div>`;
  }).join('');

  let matrix = '';
  if (people.length >= 3) {
    const heads = people.map(p => `<th title="${esc(p.n)}">${esc(p.n.length > 7 ? p.n.slice(0,6)+'…' : p.n)}</th>`).join('');
    const mrows = people.map(row => {
      const cells = people.map(col => {
        if (row === col) return `<td class="self">—</td>`;
        if (row.ethanol === 0 && col.ethanol === 0) return `<td class="nil">·</td>`;
        if (row.ethanol === 0) return `<td class="hi">∞</td>`;
        if (col.ethanol === 0) return `<td class="nil">0×</td>`;
        const r = col.ethanol / row.ethanol;
        return `<td class="${Math.abs(r-1) < 0.03 ? '' : r > 1 ? 'hi' : 'lo'}">${fmt(r,2)}×</td>`;
      }).join('');
      const label = esc(row.n.length > 7 ? row.n.slice(0,6)+'…' : row.n);
      return `<tr><td>${label}</td>${cells}</tr>`;
    }).join('');
    matrix = `
      <div class="matrix-wrap">
        <div class="matrix-label">Head-to-head · cell = column ÷ row</div>
        <table class="matrix-table">
          <thead><tr><th></th>${heads}</tr></thead>
          <tbody>${mrows}</tbody>
        </table>
      </div>`;
  }

  return `
    <details class="cmp-section">
      <summary class="cmp-summary">Detailed comparison</summary>
      <div class="cmp-body">${rows}${matrix}</div>
    </details>`;
}

function render(data) {
  const ts   = new Date(data.ts || Date.now());
  const date = ts.toLocaleDateString('en-CA', { weekday: 'long', month: 'long', day: 'numeric' });
  const time = ts.toLocaleTimeString('en-CA', { hour: 'numeric', minute: '2-digit' });
  const bm   = data.bm;

  const people = data.p.map(p => {
    const ethanol = p.d.reduce((s, d) => s + ethanolOf(d), 0);
    const std     = stdOf(ethanol);
    const bmEquiv = bm ? ethanol / ethanolOf(bm) : null;
    return { ...p, ethanol, std, bmEquiv };
  });

  const totalStd     = people.reduce((s, p) => s + p.std,     0);
  const totalEthanol = people.reduce((s, p) => s + p.ethanol, 0);
  const maxStd       = Math.max(...people.map(p => p.std), 0.001);
  const sorted       = [...people].sort((a, b) => b.std - a.std);

  const barClasses = ['top', 'mid', 'rest'];
  const rankings = sorted.map((p, i) => `
    <div class="rank-row">
      <div class="rank-name">${esc(p.n)}</div>
      <div class="rank-bar-track"><div class="rank-bar ${barClasses[i] || 'rest'}" style="width:${(p.std/maxStd*100).toFixed(1)}%"></div></div>
      <div class="rank-val">${fmt(p.std, 1)} std</div>
    </div>`).join('');

  const cards = people.map(p => {
    const drinkRows = p.d.length === 0
      ? `<div class="drink-row"><div class="dn" style="font-style:italic;color:var(--ink-soft)">No drinks logged</div></div>`
      : p.d.map(d => `
          <div class="drink-row">
            <div class="dn">${esc(d.n)}${d.f ? ` <span style="color:var(--amber);font-style:italic;">· ${esc(d.f)}</span>` : ''}</div>
            <div class="dm">${fmt(d.v, 0)} ml · ${fmt(d.a, 1)}%</div>
            <div class="ds">+${fmt(stdOf(ethanolOf(d)), 2)}</div>
          </div>`).join('');
    const bmLine = bm && p.bmEquiv != null
      ? ` · ≈ ${fmt(p.bmEquiv, 1)} ${esc(bm.n.toLowerCase())}${Math.round(p.bmEquiv) === 1 ? '' : 's'}` : '';
    return `
      <div class="person-card">
        <div class="card-head">
          <div class="card-name">${esc(p.n)}</div>
          <div class="card-meta">${fmt(p.ethanol, 1)} ml ethanol${bmLine}</div>
          <div class="card-quip">${personalQuip(p.std)}</div>
        </div>
        <div class="drink-list">${drinkRows}</div>
        <div class="card-foot">
          <span>${p.d.length} drink${p.d.length === 1 ? '' : 's'}</span>
          <span class="total">${fmt(p.std, 2)} std drinks</span>
        </div>
      </div>`;
  }).join('');

  const bmTile = bm
    ? `<div class="total-tile">
        <div class="tl">in ${esc(bm.n.toLowerCase())}s</div>
        <div class="tv">${fmt(totalEthanol / ethanolOf(bm), 1)}</div>
        <div class="ts">@ ${fmt(bm.a, 1)}% combined</div>
       </div>`
    : `<div class="total-tile">
        <div class="tl">ethanol</div>
        <div class="tv">${fmt(totalEthanol, 0)}</div>
        <div class="ts">ml combined</div>
       </div>`;

  document.getElementById('root').innerHTML = `
    <div class="brand">
      <span class="brand-name">Beer Converter</span>
      <span class="brand-dot">·</span>
      <span class="brand-date">${esc(date)} · ${esc(time)}</span>
    </div>

    <h1 class="report-title">The Night's <em>Tally</em></h1>
    <p class="report-sub">Featuring: ${people.map(p => esc(p.n)).join(', ')}</p>

    <div class="rankings">${rankings}</div>
    ${buildDonut(people)}
    <div class="quip-block">${groupQuip(people)}</div>

    <hr class="div">

    ${cards}
    ${buildComparison(people, bm)}

    ${data.c && data.c.length > 0 ? `
      <div class="comments-log">
        <div class="log-title">Session Log</div>
        ${data.c.map(c => `
          <div class="log-item">
            <div class="log-meta">
              <span class="log-author">${esc(c.author)}</span>
              <span class="log-time">${new Date(c.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
            </div>
            <div class="log-text">${esc(c.t)}</div>
          </div>
        `).join('')}
      </div>
    ` : ''}

    <div class="totals-grid">
      <div class="total-tile">
        <div class="tl">standard drinks</div>
        <div class="tv">${fmt(totalStd, 1)}</div>
        <div class="ts">combined total</div>
      </div>
      ${bmTile}
    </div>

    <div class="actions">
      <button class="btn primary" id="btnCopy">Copy report link</button>
      <a href="/" class="btn ghost">← New session</a>
    </div>

    <p class="footnote">
      1 std drink = ${STD_DRINK_ML} ml ethanol ·
      <a href="https://www.canada.ca/en/health-canada/services/substance-use/alcohol/low-risk-alcohol-drinking-guidelines.html"
         target="_blank" rel="noopener noreferrer">Health Canada</a>
      · Live tally — refreshes every few seconds.
    </p>
  `;

  document.getElementById('btnCopy').addEventListener('click', () => {
    const btn = document.getElementById('btnCopy');
    navigator.clipboard.writeText(location.href).then(() => {
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = 'Copy report link'; }, 2200);
    }).catch(() => { prompt('Copy this link:', location.href); });
  });
}

// Keep a module-level reference so the polling loop can compare updatedAt.
let currentData = null;

function maybeRender(data) {
  if (!data || !Array.isArray(data.p) || data.p.length === 0) return;
  if (currentData && currentData._updatedAt && data._updatedAt === currentData._updatedAt) return;
  currentData = data;
  render(data);
}

(async () => {
  const initial = await loadInitial();
  maybeRender(initial);

  // Poll every 5 s for live updates when this report points at a server
  // session. Static (?d=) reports skip polling.
  const sid = new URLSearchParams(location.search).get('s');
  if (!sid) return;
  setInterval(async () => {
    if (document.visibilityState !== 'visible') return;
    try { maybeRender(await fetchSession(sid)); }
    catch (e) { /* network blip — try again next tick */ }
  }, 5000);
})();

// Theme toggle — reads the same localStorage key as the main app.
const THEME_COLOURS = { bar: '#17110a', beach: '#f3e6c7' };
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', THEME_COLOURS[t] || THEME_COLOURS.bar);
  const btn = document.getElementById('btnTheme');
  if (btn) btn.title = t === 'beach' ? 'Switch to bar mode' : 'Switch to beach mode';
}
applyTheme(localStorage.getItem('beerConverter.theme') || 'bar');
document.getElementById('btnTheme').addEventListener('click', () => {
  const next = document.documentElement.getAttribute('data-theme') === 'beach' ? 'bar' : 'beach';
  applyTheme(next);
  try { localStorage.setItem('beerConverter.theme', next); } catch {}
});
</script>
</body>
</html>
